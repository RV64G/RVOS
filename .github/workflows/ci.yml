name: RVOS CI (C only)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test RVOS
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install host dependencies
      run: ./scripts/install-deps-ubuntu.sh

    - name: Run kernel selftest
      run: make test

    - name: Build default EFI artifacts
      run: make all efi-esp

    - name: Upload EFI artifact
      uses: actions/upload-artifact@v4
      with:
        name: rvos-efi-artifacts
        path: |
          build/efi/BOOTRISCV64.EFI
          build/kernel/kernel.elf
          build/efi/esp.img
        if-no-files-found: error

    - name: Upload selftest artifact
      uses: actions/upload-artifact@v4
      with:
        name: rvos-selftest-artifacts
        path: |
          build/test/kernel/kernel.elf
          build/test/esp.img
          build/test/qemu-selftest.log
        if-no-files-found: error
