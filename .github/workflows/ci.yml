name: RVOS CI (C only)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test RVOS
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install host dependencies
      run: ./scripts/install-deps-ubuntu.sh

    - name: Build default EFI application
      run: make all

    - name: Upload EFI artifact
      uses: actions/upload-artifact@v4
      with:
        name: rvos-efi
        path: build/efi/BOOTRISCV64.EFI
        if-no-files-found: error

    - name: Build legacy OS image with Clang
      run: |
        make clean
        make image

    - name: Build legacy OS image with GCC
      run: |
        make clean
        make image TOOLCHAIN=gcc
