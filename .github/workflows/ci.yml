name: RVOS CI (C only)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test RVOS
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install host dependencies
      run: ./scripts/install-deps-ubuntu.sh

    - name: Build OS kernel with GCC
      run: make all TOOLCHAIN=gcc

    - name: Build OS kernel with Clang
      run: |
        make clean
        make all

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rvos-build
        path: |
          Image
