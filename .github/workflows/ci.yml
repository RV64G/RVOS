name: RVOS CI (C only)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test RVOS
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install host dependencies
      run: ./scripts/install-deps-ubuntu.sh

    - name: Build default EFI application
      run: make all

    - name: Check kernel undefined symbols
      run: make check-undef

    - name: Build EFI system partition image
      run: make efi-esp

    - name: Upload EFI artifact
      uses: actions/upload-artifact@v4
      with:
        name: rvos-efi-artifacts
        path: |
          build/efi/BOOTRISCV64.EFI
          build/kernel/kernel.elf
        if-no-files-found: error
